front:
  text: 九天上聖祕傳金符經附天皇太一神律避穢經吹三金經曰天有九星願濟世間五音人推用凡有用者先於曆內看日辰便隨四季六十甲子逐日取用看天星利與不利世人多即檢閲諸書通用便許作用而不知誤人多矣致使人亡家破橫遭官刑牛馬退失兒女夭橫盜賊相侵火光驚恐田園退散蓋犯凶星使之然也若遇吉星稱心如意萬不失一無不感應不可忽之凡人家造宅安墳不依三元九星吉日起造者立遭橫禍人丁退失遇賊盜遭官事金穀虛耗竈鳴釜響飛鳥入宅貓犬作怪平地生事男女不和夫婦不順自刑落水手足帶疾損目缺唇孕婦傷胎少不伏長凡事不祥如作吉星者有官者祿位高遷百事稱心門户增秀長幼歡樂男女伶俐奴僕順從六畜興旺萬事如意金經曰凡立州縣鎮市寺觀社廟府縣宅舍莊庫店業者須看年月日時有吉星者用則吉排定六十甲子日辰吉凶星曜開列于後
