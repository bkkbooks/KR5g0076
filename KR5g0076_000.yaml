body:
  text: 正四七十四孟之月甲子妖星乙丑或星丙寅禾刀丁卯煞貢戊辰直星己巳卜水庚午角巳辛未人專壬申立早癸酉妖星甲戌或星乙亥禾刀丙子煞貢丁丑直星戊寅卜木己卯角巳庚辰人專辛巳立早壬午妖星癸未或星甲申禾刀乙酉煞貢丙戌直星丁亥卜星戊子角巳己丑人專庚寅立早辛卯妖星壬辰或星癸巳禾刀甲午煞貢乙未直星丙申卜木丁酉角巳戊戌人專己亥立早庚子妖星辛丑或星壬寅禾刀癸卯煞貢甲辰直星乙巳卜木丙午角巳丁未人專戊申立早己酉妖星庚戌或星辛亥禾刀壬子煞貢癸丑直星甲寅卜木乙卯角巳丙辰人專丁巳立早戊午妖星己未或星庚申禾刀辛酉煞貢壬戌直星癸亥卜木二五八十一四仲之月甲子或星乙丑禾刀丙寅煞貢丁卯直星戊辰卜木己巳角巳庚午人專辛未立早壬申妖星癸酉或星甲戌禾刀乙亥煞貢丙子直星丁丑卜木戊寅角巳己卯人專庚辰立早辛巳妖星壬午或星癸未禾刀甲申煞貢乙酉直星丙戌卜木丁亥角已戊子人專己丑立早庚寅妖星辛卯或星壬辰禾刀癸巳煞貢甲午直星乙未卜木丙申角巳丁酉人專戊戌立早己亥妖星庚子或星辛丑禾刀壬寅煞貢癸卯直星甲辰卜木乙巳角巳丙午人專丁未立早戊申妖星己酉或星庚戌禾刀辛亥煞貢壬子直星癸丑卜木甲寅角巳乙卯人專丙辰立早丁巳妖星戊午或星己未禾刀庚申煞貢辛酉直星壬戌卜木癸亥角巳三六九十二四季之月甲子禾刀乙丑煞貢丙寅直星丁卯卜木戊辰角巳己巳人專庚午立早辛未妖星壬申或星癸酉禾刀甲戌煞貢乙亥直星丙子卜木丁丑角巳戊寅人專己卯立早庚辰妖星辛巳或星壬午禾刀癸未煞貢甲申直星乙酉卜木丙戌角巳丁亥人專戊子立早己丑妖星庚寅或星辛卯禾刀壬辰煞貢癸巳直星甲午卜木乙未角巳丙申人專丁酉立早戊戌妖星己亥或星庚子禾刀辛丑煞貢壬寅直星癸卯卜木甲辰角巳乙巳人專丙午立早丁未妖星戊申或星己酉禾刀庚戌煞貢辛亥直星壬子卜木癸丑角巳甲寅人專乙卯立早丙辰妖星丁巳或星戊午禾刀己未煞貢庚申直星辛酉卜木壬戌角巳癸亥人專如作此星者名曰玄武符入宅若人起造嫁娶移徙祭祀不論大小動用入宅開張鋪店等事不出一年內人口災凶遭官失賊牢獄刑禁主人口落水四百日後主人口有腹痛疾死田宅退散蓋惡星來害主伯衰敗定主服動損長男大凶主當日衍木等落水或有口舌自東方南方而來或星如作此星者名曰朱雀入宅當主火盜大凶一年內主被人脫漏欺騙等事凡嫁娶移徙上官開張庫店修造等事一年之內主伯衰敗六畜傷死生子不肖主婦人淫亂因事破壞先主陰人六十日內痢疾立見喪服大凶若當日見口舌陰人小口災凶向後有災此日只利安墳若有他故皆不可用禾刀如作此星者名曰白虎入宅不出一年內損不明之人大凶凡人上官赴任造作起蓋嫁娶移徙葬埋開張庫店等事不出一年內主人疾病孝服主虎傷殺人口刀兵之事蓋被凶星相犯主百事災凶若積陰德之人家須見血光必主奴僕當災煞貢如作此星者名曰青龍天德符入宅凡人家起蓋嫁娶開張鋪店移徙上官赴任造橋等事不出三年內有官者祿位高遷無官者田宅增盈富貴興旺主生貴子至三年後大發財穀父慈子孝奴僕成行所為多慶凡遇吉曜照臨不拘大小造作無避僧道用之皆吉直星如作此星者名曰金匱符入宅值此星者几干造作上官赴任嫁娶開張修造陰宅不出三年內有大吉慶有官者高遷無官者百事稱心牛馬生旺百口食或七十二人富貴榮華主當年招橫財若遇金神七煞凶半年內三七日見五月內主失脫遭官事僧道用事俱吉卜木如作此星者名曰黑道符入宅值此星者不出一年內出風聲之人凶人多刑禍若造作嫁娶葬埋栘徙開張庫店僧道入院添修等事不出二年內主有大驚動哀哭水火官災之厄子孫相剋兄弟不和盜賊驚恐虛耗六畜不長百事衰敗七年大凶如遇家長有福德者雖人財不祥尚可拜投賢聖祈力保扶角己此星名曰太陰入宅如值此星者不吉凡遇嫁娶移徙上官改换門户葬埋等事不出三年主有患病腹痛之疾枷杖蛇傷之厄盜賊水火物業退散如家長有福德相扶只見口舌死有凶星惡事人專此星名曰六陰金堂符入宅如值此星者不出一年主生貴子凡造作嫁娶葬埋開張移徙上官入宅移門添修屋宇主三年內有官者祿位重重無官者所為吉慶大發財穀得外人力善事交集僧道用之俱吉立早此星名曰勾陳符入宅如值此星者造作嫁娶埋葬開張上官赴任修造等事奏將不吉一年內人口退散百事不利家宅破亡如開木堆立木上梁定船航事主人匠刀斧血光之厄如有陰人相扶有口舌作鬧諸事不利金符經者聖人祕要與諸家書不同又曰救苦經亦曰宅寶經靈經異書莫傳下愚諸葛先生萬年出行圖昔南陽卧龍諸葛先生選揀萬年出行圖一本傳流於後楝時開渠放水竪柱上梁迎婚娶婦納財問名安磑磨修造安葬選揀吉日吉慶善惡避之遇凶時一吉無應不宜動用只宜回避選得吉時不選一百二十步凶煞用之大吉今定上中下三輪周而復始循環不已將定到例月分日數選楝用之吉凶自見上元將軍所管吉凶之圖正月四月七月十月四孟之圖順陽日出行者去處通達爭訟有理不逢盜賊求財稱意好人相逢出遇酒食此日出行大吉堂房日出行者神道不在宅中求財稱意好人相逢此日用之大吉金庫日出行者車馬不成大有失誤路逢盜賊求財不得此日大凶金堂日出行者吉利通達爭訟有理求財稱意此日用之吉賊盜日出行者不利所求未遂必主人亡枷鎖臨身只宜回避此日百事不宜用寶倉日出行者大人見喜百事通達求財稱意衣錦還鄉此日可用百事吉中元將軍所管吉凶之圖二月五月八月十一月四仲之圖天盜日出行者求財不成口舌臨身此日大凶不宜用之天門日出行者凡事稱心諸事和合去處通達用之大吉天堂日出行所求皆遂萬事稱意買賣通亨貴人接引此日大吉天財日出行求財得財好人相逢凡事用之俱吉天賊日出行者求財失落見官無理凡事不成此日大凶天陽日出行者所求得財婚姻和合萬事稱心此日吉天猴日出行吉少凶多主有口舌見血光之災此日不宜用天倉日出行者所求得財出官見喜此日用之大吉下元將軍所管吉凶之圖三月六月九月十二月四季之圖朱雀日出行多主失財求財不得見官無理此日大凶白虎頭日出行者只宜遠行求財稱意去處通達此日大吉白虎脅日出行者求財遂心東西任意南北安然此日用之吉白虎足日出行者求財不利不宜遠行作事不成此日不宜用玄武日出行者主有口舌凡事不通不可用之青龍頭日出行者求財得利凡出行之日雞鳴卯時吉青龍脅日出行者求財遂心凡事稱意此日用之吉青龍足日出行者求財不利見官失理此日不宜用逐年九良干占方位天上凶星號九良辰戌丑未占僧堂更有城隍并社廟修之大敗主重喪寅申門井并橋路子午歸厨占竈方卯酉二年歸道觀修之立效起災殃巳亥二年歸一處行船千萬莫修裝人若不信此神煞十口須教九口亡五行順序水木火土金八卦順序乾坎艮震巽離坤兌天干甲乙丙丁戊己庚辛壬癸陽干甲丙戊庚壬陰干乙丁己辛癸地支子丑寅卯辰巳午未申酉戌亥陽支子寅辰午甲戌陰支丑卯巳未酉亥天官貴人時甲戊日丑未時乙巳日子申時丙丁日亥酉時庚辛日午寅時壬癸日卯巳時文星貴人時甲愛金雞乙愛猴丁豬丙鼠巳寅頭戊尋牛號庚宜馬辛癸逢蛇福祿昌此是有福文星貴壬騎龍背喜非常福生良辰正雞二兔是福生三更犬吠四龍爭五月呼豬來喫菜六蛇七鼠路上行八郎騎馬路上走九牛十羊好煮羹十一虎子山下過十二猴子入深坑天德良辰正丁二神宫三壬四辛同五乾六甲上七癸八艮宫九丙十居乙子巽丑庚中月德良辰丙甲壬庚隨正二三四運轉逐年地官符方子年在辰丑年在巳寅年在午卯年在未辰年在申巳年在酉午年在戌未年在亥申年在子酉年在丑戌年在寅亥年在卯起黃道例道遠幾時通達路遙何日還鄉正七詳加子二八却居寅三九辰上立四十馬頭尋五十一於申位六十二戌申論九天上聖祕傳金符經
